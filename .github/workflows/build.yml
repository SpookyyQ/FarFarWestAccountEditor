name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download LLVM-MinGW
        shell: pwsh
        run: |
          $release = Invoke-RestMethod "https://api.github.com/repos/mstorsjo/llvm-mingw/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -like "*ucrt-x86_64.zip" } | Select-Object -First 1
          Write-Host "Downloading $($asset.name)..."
          Invoke-WebRequest $asset.browser_download_url -OutFile llvm-mingw.zip
          Expand-Archive llvm-mingw.zip -DestinationPath C:\llvm-mingw-extract
          $inner = Get-ChildItem C:\llvm-mingw-extract | Select-Object -First 1
          Move-Item $inner.FullName C:\llvm-mingw

      - name: Build
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root   = $env:GITHUB_WORKSPACE
          $clang  = "C:\llvm-mingw\bin\clang++.exe"
          $tBin   = "C:\llvm-mingw\x86_64-w64-mingw32\bin"
          $out    = "$root\build"
          $exe    = "$out\FarFarWest Unlock all tool.exe"
          $wv2Inc = "$root\third_party_webview2\build\native\include"
          $wv2Lib = "$root\third_party_webview2\build\native\x64\WebView2Loader.dll.lib"
          $wv2Dll = "$root\third_party_webview2\build\native\x64\WebView2Loader.dll"

          New-Item -ItemType Directory -Force $out | Out-Null

          & powershell -ExecutionPolicy Bypass -File "$root\make_icon_res.ps1" -OutRes "$out\app.res"
          if ($LASTEXITCODE) { throw "Icon generation failed" }

          & $clang --target=x86_64-w64-windows-gnu -std=c++20 -O2 -municode -mwindows `
            "-I$wv2Inc" "$root\src\main.cpp" $wv2Lib "$out\app.res" `
            '-o' $exe `
            -lcomctl32 -lshell32 -lshlwapi -ldwmapi -lbcrypt -lole32 -loleaut32 -luuid -lmsimg32
          if ($LASTEXITCODE) { throw "Compilation failed" }

          Copy-Item "$tBin\libc++.dll"           $out
          Copy-Item "$tBin\libunwind.dll"         $out
          Copy-Item "$tBin\libwinpthread-1.dll"   $out
          Copy-Item $wv2Dll                       $out

          if (Test-Path "$out\ui") { Remove-Item "$out\ui" -Recurse -Force }
          Copy-Item "$root\assets\ui" "$out\ui" -Recurse

          Write-Host "Built: $exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FarFarWest-Unlock-all-tool
          path: |
            build/*.exe
            build/*.dll
            build/ui/

      - name: Package release ZIP
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $appDir = "release\FarFarWest Unlock all tool"
          New-Item -ItemType Directory -Force -Path $appDir | Out-Null
          Copy-Item "build\FarFarWest Unlock all tool.exe" $appDir
          Copy-Item "build\*.dll" $appDir
          Copy-Item "README_RELEASE.txt" "$appDir\README.txt"
          Copy-Item "build\ui" $appDir -Recurse
          Compress-Archive -Path $appDir -DestinationPath "release\FarFarWest-Unlock-all-tool.zip"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/FarFarWest-Unlock-all-tool.zip
          body: |
            ## v1.4.7

            **What's new:**
            - Fix: save files containing blueprint properties with a PropertyGuid tag (e.g. `specialWeaponElement_68_…`) now load correctly instead of failing with `"Invalid property terminator"`. The PropertyGuid bytes are preserved on write so save files round-trip without data loss.

            **Installation:** Download the ZIP, extract it, and run `FarFarWest Unlock all tool.exe`. If WebView2 is missing or damaged, install the Microsoft Edge WebView2 Runtime from Microsoft and start the tool again.
